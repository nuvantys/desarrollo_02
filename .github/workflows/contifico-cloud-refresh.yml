name: contifico-cloud-refresh
run-name: Contifico ${{ inputs.scope || 'refresh' }} cloud refresh ${{ inputs.requested_at || '' }}

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "refresh o backfill"
        required: true
        default: refresh
        type: choice
        options:
          - refresh
          - backfill
      trigger_source:
        description: "quien disparo la corrida"
        required: false
        default: dashboard
        type: string
      requested_at:
        description: "marca temporal del disparo"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: contifico-cloud-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh Supabase from Contifico API
        env:
          CONTIFICO_AUTHORIZATION: ${{ secrets.CONTIFICO_AUTHORIZATION }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python contifico_pg_backfill.py --mode "${{ inputs.scope }}" --db-name postgres --report-out final_report.md --base-url https://api.contifico.com --max-workers 6
          python export_dashboard_data.py --db-name postgres --out-dir dashboard/data

      - name: Commit published snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add final_report.md dashboard/data
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
            exit 0
          fi
          git commit -m "chore: actualiza snapshot cloud de Contifico"
          git push
